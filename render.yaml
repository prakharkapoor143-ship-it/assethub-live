services:
  - type: web
    name: assethub-live
    env: docker
    plan: free
    autoDeploy: true
    healthCheckPath: /up
    envVars:
      - key: APP_NAME
        value: AssetHub
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        sync: false
      - key: APP_URL
        fromService:
          type: web
          name: assethub-live
          property: host
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: assethub-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: assethub-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: assethub-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: assethub-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: assethub-db
          property: password
      - key: SESSION_DRIVER
        value: file
      - key: CACHE_STORE
        value: file
      - key: QUEUE_CONNECTION
        value: sync
      - key: LOG_CHANNEL
        value: stderr

databases:
  - name: assethub-db
    plan: free